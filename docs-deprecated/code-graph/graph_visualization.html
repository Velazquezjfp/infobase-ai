            stroke: #fff;

            stroke: #999;
            stroke-width: 1.5px;

            border-radius: 6px;
            font-size: 14px;
            pointer-events: none;

        const links = [];

        // Set up dimensions and margins
        const margin = {top: 20, right: 20, bottom: 20, left: 20};
        const width = 1200;
        const height = 600;

        // Create SVG
        const svg = d3.select("#graph")
            .attr("width", width)
            .attr("height", height);

        // Create groups for zoomable content
        const container = svg.append("g");

        // Define zoom behavior
        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", function(event) {
                container.attr("transform", event.transform);
            });

        svg.call(zoom);

        // Color scale for node types
        const entityTypes = [...new Set(nodes.map(d => d.type))];
        const colorScale = d3.scaleOrdinal()
            .domain(entityTypes)
            .range(d3.schemeCategory10);

        // Create legend
        function createLegend() {
            const legend = d3.select("#legend");
            legend.append("h4").text("Entity Types");

            const items = legend.selectAll(".legend-item")
                .data(entityTypes)
                .enter()
                .append("div")
                .attr("class", "legend-item");

            items.append("div")
                .attr("class", "legend-color")
                .style("background-color", d => colorScale(d));

            items.append("span")
                .text(d => d);
        }

        // Define arrow marker
        svg.append("defs").append("marker")
            .attr("id", "arrowhead")
            .attr("viewBox", "-0 -5 10 10")
            .attr("refX", 20)
            .attr("refY", 0)
            .attr("orient", "auto")
            .attr("markerWidth", 8)
            .attr("markerHeight", 8)
            .attr("xoverflow", "visible")
            .append("svg:path")
            .attr("d", "M 0,-5 L 10 ,0 L 0,5")
            .attr("fill", "#999")
            .style("stroke", "none");

        // Create force simulation
        let simulation = d3.forceSimulation(nodes)
            .force("link", d3.forceLink(links).id(d => d.id).distance(100))
            .force("charge", d3.forceManyBody().strength(-400))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(25));

        // Create links
        const link = container.append("g")
            .selectAll("line")
            .data(links)
            .enter().append("line")
            .attr("class", "link");

        // Create link labels
        const linkLabel = container.append("g")
            .selectAll("text")
            .data(links)
            .enter().append("text")
            .attr("class", "link-label")
            .text(d => d.type);

        // Create nodes
        const node = container.append("g")
            .selectAll("circle")
            .data(nodes)
            .enter().append("circle")
            .attr("class", "node")
            .attr("r", 12)
            .attr("fill", d => colorScale(d.type))
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));

        // Create node labels
        const nodeLabel = container.append("g")
            .selectAll("text")
            .data(nodes)
            .enter().append("text")
            .attr("class", "node-label")
            .attr("dy", -15)
            .text(d => d.id);

        // Tooltip
        const tooltip = d3.select("#tooltip");

        // Node interactions
        node
            .on("mouseover", function(event, d) {
                // Highlight node
                d3.select(this).attr("stroke", "#333").attr("stroke-width", 3);

                // Show tooltip
                let tooltipContent = `<h3>${d.id}</h3>`;
                tooltipContent += `<div class="type">Type: ${d.type}</div>`;

                if (d.observations && d.observations.length > 0) {
                    tooltipContent += '<div class="observations"><h4>Observations:</h4><ul>';
                    d.observations.forEach(obs => {
                        tooltipContent += `<li>${obs}</li>`;
                    });
                    tooltipContent += '</ul></div>';
                }

                tooltip.html(tooltipContent)
                    .style("display", "block")
                    .style("left", (event.pageX + 10) + "px")
                    .style("top", (event.pageY + 10) + "px");
            })
            .on("mousemove", function(event) {
                tooltip.style("left", (event.pageX + 10) + "px")
                    .style("top", (event.pageY + 10) + "px");
            })
            .on("mouseout", function() {
                // Remove highlight
                d3.select(this).attr("stroke", "#fff").attr("stroke-width", 2);

                // Hide tooltip
                tooltip.style("display", "none");
            })
            .on("click", function(event, d) {
                // Center on clicked node
                const transform = d3.zoomTransform(svg.node());
                const x = -d.x * transform.k + width / 2;
                const y = -d.y * transform.k + height / 2;

                svg.transition().duration(500).call(
                    zoom.transform,
                    d3.zoomIdentity.translate(x, y).scale(transform.k)
                );
            });

        // Simulation tick
        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            linkLabel
                .attr("x", d => (d.source.x + d.target.x) / 2)
                .attr("y", d => (d.source.y + d.target.y) / 2);

            node
                .attr("cx", d => d.x)
                .attr("cy", d => d.y);

            nodeLabel
                .attr("x", d => d.x)
                .attr("y", d => d.y);
        });

        // Drag functions
        function dragstarted(event) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            event.subject.fx = event.subject.x;
            event.subject.fy = event.subject.y;
        }

        function dragged(event) {
            event.subject.fx = event.x;
            event.subject.fy = event.y;
        }

        function dragended(event) {
            if (!event.active) simulation.alphaTarget(0);
            event.subject.fx = null;
            event.subject.fy = null;
        }

        // Control functions
        function resetZoom() {
            svg.transition().duration(500).call(
                zoom.transform,
                d3.zoomIdentity
            );
        }

        function centerGraph() {
            const bounds = container.node().getBBox();
            const fullWidth = width;
            const fullHeight = height;
            const widthScale = fullWidth / bounds.width;
            const heightScale = fullHeight / bounds.height;
            const scale = Math.min(widthScale, heightScale) * 0.8;
            const translate = [fullWidth / 2 - scale * bounds.x - scale * bounds.width / 2,
                             fullHeight / 2 - scale * bounds.y - scale * bounds.height / 2];

            svg.transition().duration(500).call(
                zoom.transform,
                d3.zoomIdentity.translate(translate[0], translate[1]).scale(scale)
            );
        }

        // Control event listeners
        d3.select("#nodeSize").on("change", function() {
            const size = this.value;
            const radius = size === "small" ? 8 : size === "large" ? 16 : 12;
            node.attr("r", radius);
            simulation.force("collision").radius(radius + 5);
            simulation.restart();
        });

        d3.select("#linkDistance").on("change", function() {
            const distance = this.value;
            const dist = distance === "short" ? 50 : distance === "long" ? 150 : 100;
            simulation.force("link").distance(dist);
            simulation.restart();
        });

        // Initialize
        createLegend();

        // Auto-center after initial layout
        setTimeout(() => {
            centerGraph();
        }, 1000);
    </script>
