  /api/search/semantic:
    post:
      tags:
        - Search
      summary: Perform semantic search on document
      description: |
        Perform semantic search on document content using Gemini AI with natural language queries.

        **S5-003: Semantic Search with Cross-Language Support**

        This endpoint analyzes document content and finds text passages that semantically match
        the user's natural language query. Supports cross-language search where query and document
        can be in different languages.

        **Features:**
        - Semantic understanding (matches meaning, not just keywords)
        - Cross-language search (German ↔ English)
        - Automatic language detection
        - PDF text extraction
        - Text highlighting with character positions
        - Relevance scoring (0.0-1.0)
      operationId: semanticSearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
                - documentType
              properties:
                query:
                  type: string
                  minLength: 1
                  description: Natural language search query
                  example: "passport number"
                documentContent:
                  type: string
                  description: Full text content (required for non-PDF documents)
                  example: "Name: John Doe\nReisepassnummer: 123456789"
                documentType:
                  type: string
                  description: Document type
                  example: "pdf"
                documentPath:
                  type: string
                  description: Path to PDF file (required for PDF documents)
                  example: "public/documents/ACTE-2024-001/personal-data/Passport.pdf"
                queryLanguage:
                  type: string
                  description: Query language ISO 639-1 code (auto-detected if not provided)
                  example: "en"
                documentLanguage:
                  type: string
                  description: Document language ISO 639-1 code (auto-detected if not provided)
                  example: "de"
      responses:
        '200':
          description: Search completed successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - highlights
                  - count
                  - matchSummary
                  - queryLanguage
                  - documentLanguage
                  - isCrossLanguage
                properties:
                  highlights:
                    type: array
                    items:
                      type: object
                      properties:
                        start:
                          type: integer
                          description: Starting character position
                          example: 125
                        end:
                          type: integer
                          description: Ending character position
                          example: 145
                        relevance:
                          type: number
                          format: float
                          description: Relevance score (0.0-1.0)
                          example: 0.95
                        matchedText:
                          type: string
                          description: The exact matched text
                          example: "Passnummer: 123456789"
                        context:
                          type: string
                          description: Explanation of why this matched
                          example: "Direct match: passport number field"
                  count:
                    type: integer
                    description: Total number of matches found
                    example: 2
                  matchSummary:
                    type: string
                    description: Brief summary of search results
                    example: "Found 2 relevant passages (cross-language: English → German)"
                  queryLanguage:
                    type: string
                    description: Detected or provided query language
                    example: "en"
                  documentLanguage:
                    type: string
                    description: Detected or provided document language
                    example: "de"
                  isCrossLanguage:
                    type: boolean
                    description: Whether this is a cross-language search
                    example: true
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "documentPath is required for PDF documents"
        '404':
          description: PDF file not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "PDF file not found: /path/to/document.pdf"
        '500':
          description: Search processing failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "Search failed: <error details>"
      x-source-file: backend/api/search.py

