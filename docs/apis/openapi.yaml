openapi: 3.0.3
info:
  title: BAMF ACTE Companion API
  description: |
    API specification for the BAMF ACTE (Automated Case and Task Environment) Companion application.

    **Current Status:** This is a PLANNED API specification. The application currently operates as a
    frontend-only prototype with simulated operations. This specification documents the target
    architecture for future backend implementation.

    The API will provide document management, AI-powered case processing, and integration course
    application handling for BAMF (Bundesamt für Migration und Flüchtlinge).
  version: 2.4.0
  contact:
    name: BAMF Development Team
    email: api@bamf.example.de
  license:
    name: Proprietary

servers:
  - url: https://api.bamf-acte.example.de/v1
    description: Production server (planned)
  - url: https://staging-api.bamf-acte.example.de/v1
    description: Staging server (planned)
  - url: http://localhost:3000/api/v1
    description: Local development server

tags:
  - name: Admin
    description: Administrative operations and form field generation
  - name: Authentication
    description: User authentication and authorization
  - name: Cases
    description: Case management operations
  - name: Context
    description: Document tree views and hierarchical context information
  - name: Custom Context
    description: User-defined validation rules and required documents for case context
  - name: Documents
    description: Document upload, conversion, and retrieval
  - name: Files
    description: File upload, deletion, and management operations
  - name: Folders
    description: Folder configuration and management for case organization
  - name: AI Operations
    description: AI-powered document processing and analysis
  - name: Forms
    description: Application form management
  - name: Search
    description: Cross-case and document search capabilities with semantic understanding
  - name: IDIRS
    description: IDIRS OpenSearch integration for hybrid document search and RAG queries
  - name: Validation
    description: AI-powered case validation for submission completeness

paths:
  /api/admin/generate-field:
    post:
      tags:
        - Admin
      summary: Generate form field from natural language
      description: |
        Generate a SHACL-compliant form field specification from a natural language prompt.

        The service uses rule-based extraction for common patterns and falls back to AI
        (Gemini) for more complex or ambiguous requests.

        **Supported field types:**
        - text: Standard text input
        - date: Date picker
        - select: Dropdown with options
        - textarea: Multi-line text

        **Supported languages:** English, German
      operationId: generateField
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - prompt
              properties:
                prompt:
                  type: string
                  minLength: 3
                  maxLength: 500
                  description: Natural language description of the desired field
                  example: "Add a dropdown for marital status with options single, married, divorced"
            examples:
              textField:
                summary: Text field example
                value:
                  prompt: "Add a required text field for passport number"
              selectField:
                summary: Select field example
                value:
                  prompt: "Add dropdown for education level with options high school, bachelor, master"
              dateField:
                summary: Date field example
                value:
                  prompt: "Create a date field for visa expiry date"
      responses:
        '200':
          description: Field generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  field:
                    $ref: '#/components/schemas/GeneratedField'
                  message:
                    type: string
                    example: "Successfully generated 'Marital Status' field"
        '400':
          description: Invalid request or generation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: object
                    properties:
                      error:
                        type: string
                        example: "Field generation failed"
                      detail:
                        type: string
                        example: "Prompt is too short or ambiguous"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-source-file: backend/api/admin.py

  /api/admin/health:
    get:
      tags:
        - Admin
      summary: Admin service health check
      description: Check the health status of the admin service and feature availability
      operationId: adminHealthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                    example: admin
                  status:
                    type: string
                    example: ready
                  features:
                    type: object
                    properties:
                      field_generation:
                        type: boolean
                        example: true
      x-source-file: backend/api/admin.py

  /api/files/upload:
    post:
      tags:
        - Files
      summary: Upload file to case folder
      description: |
        Upload a file to a specific case folder with size validation and security checks.

        **Features:**
        - Maximum file size: 15 MB
        - Case-scoped storage: files stored in public/documents/{caseId}/{folderId}/
        - Filename sanitization to prevent path traversal attacks
        - Automatic folder creation if needed

        **Security:**
        - Path traversal prevention (no ../ allowed)
        - Filename sanitization (special characters removed)
        - Case directory validation
      operationId: uploadFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - case_id
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload
                case_id:
                  type: string
                  description: Case ID (e.g., ACTE-2024-001)
                  example: ACTE-2024-001
                folder_id:
                  type: string
                  description: Target folder ID (default uploads)
                  default: uploads
                  example: uploads
                rename_to:
                  type: string
                  description: Alternative filename (for duplicate handling)
                  example: document_1.pdf
      responses:
        '200':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - file_path
                  - file_name
                  - size
                  - message
                properties:
                  success:
                    type: boolean
                    example: true
                  file_path:
                    type: string
                    description: Relative path documents/{caseId}/{folderId}/{filename}
                    example: documents/ACTE-2024-001/uploads/document.pdf
                  file_name:
                    type: string
                    example: document.pdf
                  size:
                    type: integer
                    description: File size in bytes
                    example: 2458624
                  message:
                    type: string
                    example: File 'document.pdf' uploaded successfully
        '400':
          description: Invalid request (bad path, invalid file)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileError'
        '413':
          description: File exceeds 15 MB size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileError'
      x-source-file: backend/api/files.py

  /api/files/{case_id}/{folder_id}/{filename}:
    delete:
      tags:
        - Files
      summary: Delete file from case folder
      description: |
        Delete a file from a specific case folder with security validation.

        **Security:**
        - Path traversal prevention (validates resolved path stays within case directory)
        - Case ID and folder ID format validation
        - Filename sanitization
      operationId: deleteFile
      parameters:
        - name: case_id
          in: path
          required: true
          description: Case ID (e.g., ACTE-2024-001)
          schema:
            type: string
            example: ACTE-2024-001
        - name: folder_id
          in: path
          required: true
          description: Folder ID (e.g., uploads)
          schema:
            type: string
            example: uploads
        - name: filename
          in: path
          required: true
          description: Name of the file to delete
          schema:
            type: string
            example: document.pdf
      responses:
        '200':
          description: File deleted successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - message
                  - file_name
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: File 'document.pdf' deleted successfully
                  file_name:
                    type: string
                    example: document.pdf
        '400':
          description: Invalid request (bad path)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileError'
        '403':
          description: Access denied (path traversal attempt)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileError'
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileError'
      x-source-file: backend/api/files.py

  /api/files/exists/{case_id}/{folder_id}/{filename}:
    get:
      tags:
        - Files
      summary: Check if file exists (duplicate detection)
      description: |
        Check if a file already exists in a specific case folder.
        If the file exists, returns a suggested unique filename.

        **Use case:** Call this endpoint before uploading to detect duplicates
        and give the user options to rename or cancel.
      operationId: checkFileExists
      parameters:
        - name: case_id
          in: path
          required: true
          description: Case ID (e.g., ACTE-2024-001)
          schema:
            type: string
            example: ACTE-2024-001
        - name: folder_id
          in: path
          required: true
          description: Folder ID (e.g., uploads)
          schema:
            type: string
            example: uploads
        - name: filename
          in: path
          required: true
          description: Name of the file to check
          schema:
            type: string
            example: document.pdf
      responses:
        '200':
          description: File existence check completed
          content:
            application/json:
              schema:
                type: object
                required:
                  - exists
                  - file_name
                properties:
                  exists:
                    type: boolean
                    description: Whether the file exists
                    example: true
                  file_name:
                    type: string
                    description: The sanitized filename checked
                    example: document.pdf
                  suggested_name:
                    type: string
                    nullable: true
                    description: If file exists, a suggested unique filename
                    example: document_1.pdf
        '400':
          description: Invalid request (bad path)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileError'
      x-source-file: backend/api/files.py

  /api/files/health:
    get:
      tags:
        - Files
      summary: File service health check
      description: Check the health status of the file upload service
      operationId: filesHealthCheck
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                    example: files
                  status:
                    type: string
                    example: ready
                  features:
                    type: object
                    properties:
                      upload:
                        type: boolean
                        example: true
                      max_file_size_mb:
                        type: integer
                        example: 15
                      storage_path:
                        type: string
                        example: public/documents/
                  storage:
                    type: object
                    properties:
                      available:
                        type: boolean
                        example: true
                      path:
                        type: string
                        example: /home/ayanm/projects/info-base/infobase-ai/public/documents
        '503':
          description: Service is degraded (storage not available)
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                    example: files
                  status:
                    type: string
                    example: degraded
                  features:
                    type: object
                    properties:
                      upload:
                        type: boolean
                        example: true
                      max_file_size_mb:
                        type: integer
                        example: 15
                      storage_path:
                        type: string
                        example: public/documents/
                  storage:
                    type: object
                    properties:
                      available:
                        type: boolean
                        example: false
                      path:
                        type: string
                        example: /home/ayanm/projects/info-base/infobase-ai/public/documents
      x-source-file: backend/api/files.py

  /api/context/tree/{case_id}:
    get:
      tags:
        - Context
      summary: Get document tree view for case
      description: |
        Retrieve hierarchical document tree view for a specific case.

        **S5-011: Cascading Context with Document Tree View**

        Returns a hierarchical text representation of all folders and documents
        in the case, formatted with ASCII tree characters (├── └──).

        **Features:**
        - Cached for performance (regenerates on document changes)
        - Localized folder names based on language parameter
        - Shows empty folders
        - Lists all documents with original filenames
      operationId: getTreeView
      parameters:
        - name: case_id
          in: path
          required: true
          description: Case ID (e.g., ACTE-2024-001)
          schema:
            type: string
            example: ACTE-2024-001
        - name: language
          in: query
          required: false
          description: Language for folder names ('de' for German, 'en' for English)
          schema:
            type: string
            enum: [de, en]
            default: de
            example: de
      responses:
        '200':
          description: Tree view retrieved successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - treeView
                  - folders
                  - documentCount
                properties:
                  treeView:
                    type: string
                    description: Hierarchical tree representation with ASCII characters
                    example: "Case ACTE-2024-001:\n├── Personal Data (5 documents)\n│   ├── Passport_Scan.pdf\n│   └── Birth_Certificate.pdf"
                  folders:
                    type: array
                    items:
                      type: string
                    description: List of folder display names
                    example: ["Personal Data", "Applications", "Evidence"]
                  documentCount:
                    type: integer
                    description: Total number of documents in the case
                    example: 10
        '404':
          description: Case not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: object
                    properties:
                      error:
                        type: string
                        example: Case not found
                      case_id:
                        type: string
                        example: ACTE-2024-001
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: object
                    properties:
                      error:
                        type: string
                        example: Failed to generate tree view
                      detail:
                        type: string
                      case_id:
                        type: string
      x-source-file: backend/api/context.py

  /api/custom-context/{case_id}:
    get:
      tags:
        - Custom Context
      summary: Get custom context rules for a case
      description: |
        Retrieve all custom validation rules and required documents for a case.

        **S5-017: Custom Context Rules API**

        Users can add custom validation rules and document requirements through the
        /Aktenkontext slash command. These rules are stored per-case and can be
        managed through this API.

        **Rule Types:**
        - validation_rule: Custom validation rules for folders or files
        - required_document: Custom required document definitions

        **Features:**
        - Case-scoped custom rules
        - Target folder specification
        - Chronological ordering (newest first)
        - Persistent storage in JSON format
      operationId: getCustomRules
      parameters:
        - name: case_id
          in: path
          required: true
          description: Case ID (e.g., ACTE-2024-001)
          schema:
            type: string
            example: ACTE-2024-001
      responses:
        '200':
          description: Custom rules retrieved successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - message
                  - rules
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Found 2 custom rule(s)"
                  rules:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomContextRule'
        '404':
          description: Case not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: object
                    properties:
                      error:
                        type: string
                        example: Case not found
                      case_id:
                        type: string
                        example: ACTE-2024-001
      x-source-file: backend/api/custom_context.py

  /api/custom-context/{case_id}/rule:
    post:
      tags:
        - Custom Context
      summary: Add a validation rule
      description: |
        Add a custom validation rule to the case context.

        **S5-017: Custom Context Rules API**

        Validation rules define custom checks for documents or folders.
        Each rule is assigned a unique ID and timestamp.

        **Rule Types:**
        - file_type: File type restrictions
        - content: Content validation rules
        - metadata: Metadata requirements
        - completeness: Completeness checks
      operationId: addValidationRule
      parameters:
        - name: case_id
          in: path
          required: true
          description: Case ID (e.g., ACTE-2024-001)
          schema:
            type: string
            example: ACTE-2024-001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ruleType
                - rule
              properties:
                targetFolder:
                  type: string
                  nullable: true
                  description: Target folder for the rule (optional)
                  example: Evidence
                ruleType:
                  type: string
                  description: Type of rule
                  enum: [file_type, content, metadata, completeness]
                  example: file_type
                rule:
                  type: string
                  description: The rule description/text
                  example: Only PDFs should be allowed in here
            examples:
              folderRule:
                summary: Folder-specific rule
                value:
                  targetFolder: Evidence
                  ruleType: file_type
                  rule: Only PDFs should be allowed in here
              globalRule:
                summary: Global validation rule
                value:
                  ruleType: completeness
                  rule: All documents must have clear scans with no blurred text
      responses:
        '200':
          description: Validation rule added successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - message
                  - rule
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Validation rule added successfully
                  rule:
                    $ref: '#/components/schemas/CustomContextRule'
        '404':
          description: Case not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: object
                    properties:
                      error:
                        type: string
                        example: Case not found
                      case_id:
                        type: string
        '500':
          description: Failed to save rule
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: object
                    properties:
                      error:
                        type: string
                        example: Failed to save rule
                      case_id:
                        type: string
      x-source-file: backend/api/custom_context.py

  /api/custom-context/{case_id}/document:
    post:
      tags:
        - Custom Context
      summary: Add a required document
      description: |
        Add a custom required document to the case context.

        **S5-017: Custom Context Rules API**

        Required documents define what additional documents are expected
        for the case. Each document requirement is assigned a unique ID and timestamp.

        **Features:**
        - Target folder specification (optional)
        - Automatic ruleType: document_requirement
        - Persistent storage
      operationId: addRequiredDocument
      parameters:
        - name: case_id
          in: path
          required: true
          description: Case ID (e.g., ACTE-2024-001)
          schema:
            type: string
            example: ACTE-2024-001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - description
              properties:
                description:
                  type: string
                  description: Description of the required document
                  example: Proof of German language proficiency (B1 certificate)
                targetFolder:
                  type: string
                  nullable: true
                  description: Target folder for the document (optional)
                  example: Language Certificates
            examples:
              withFolder:
                summary: Required document with target folder
                value:
                  description: Proof of German language proficiency (B1 certificate)
                  targetFolder: Language Certificates
              withoutFolder:
                summary: Required document without folder
                value:
                  description: Recent passport photo
      responses:
        '200':
          description: Required document added successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - message
                  - rule
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Required document added successfully
                  rule:
                    $ref: '#/components/schemas/CustomContextRule'
        '404':
          description: Case not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: object
                    properties:
                      error:
                        type: string
                        example: Case not found
                      case_id:
                        type: string
        '500':
          description: Failed to save document requirement
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: object
                    properties:
                      error:
                        type: string
                        example: Failed to save document requirement
                      case_id:
                        type: string
      x-source-file: backend/api/custom_context.py

  /api/custom-context/{case_id}/{rule_id}:
    delete:
      tags:
        - Custom Context
      summary: Remove a custom rule
      description: |
        Remove a custom validation rule or required document from the case.

        **S5-017: Custom Context Rules API**

        Deletes a rule by its ID and saves the updated rule set.
        Works for both validation_rule and required_document types.

        **Features:**
        - Removes rule by ID
        - Returns the deleted rule in response
        - Updates persistent storage
      operationId: removeCustomRule
      parameters:
        - name: case_id
          in: path
          required: true
          description: Case ID (e.g., ACTE-2024-001)
          schema:
            type: string
            example: ACTE-2024-001
        - name: rule_id
          in: path
          required: true
          description: Rule ID to delete
          schema:
            type: string
            example: custom-rule-abc12345
      responses:
        '200':
          description: Rule removed successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - message
                  - rule
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Rule removed successfully
                  rule:
                    $ref: '#/components/schemas/CustomContextRule'
        '404':
          description: Case or rule not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: object
                    properties:
                      error:
                        type: string
                        example: Rule not found
                      rule_id:
                        type: string
                        example: custom-rule-abc12345
        '500':
          description: Failed to save rules
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: object
                    properties:
                      error:
                        type: string
                        example: Failed to save rules
                      case_id:
                        type: string
      x-source-file: backend/api/custom_context.py

  /api/folders/{case_id}:
    get:
      tags:
        - Folders
      summary: Get folder configuration for a case
      description: |
        Retrieve all configured folders with their localized names, display order, and mandatory status.
        Automatically ensures all physical directories exist.
      operationId: getFolders
      parameters:
        - name: case_id
          in: path
          required: true
          description: Case identifier
          schema:
            type: string
            example: ACTE-2024-001
      responses:
        '200':
          description: Folder configuration retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderConfigResponse'
        '500':
          description: Failed to load folder configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Failed to load folder config
      x-source-file: backend/api/folders.py

    post:
      tags:
        - Folders
      summary: Create a new folder
      description: |
        Create a new folder with both a configuration entry and physical directory.
        The folder ID must be unique and follow kebab-case naming conventions.
      operationId: createFolder
      parameters:
        - name: case_id
          in: path
          required: true
          description: Case identifier
          schema:
            type: string
            example: ACTE-2024-001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFolderRequest'
      responses:
        '200':
          description: Folder created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderConfig'
        '400':
          description: Invalid request (duplicate ID or invalid format)
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Folder 'my-folder' already exists
      x-source-file: backend/api/folders.py

    put:
      tags:
        - Folders
      summary: Bulk update all folders
      description: |
        Replace the entire folder configuration. Used by the admin panel when saving all folder changes.
        Creates new folders and removes deleted ones (only if empty).
      operationId: bulkUpdateFolders
      parameters:
        - name: case_id
          in: path
          required: true
          description: Case identifier
          schema:
            type: string
            example: ACTE-2024-001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkUpdateFoldersRequest'
      responses:
        '200':
          description: Folders updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderConfigResponse'
