  /api/idirs/rag:
    post:
      tags:
        - IDIRS
      summary: RAG query with AI confidence analysis
      description: |
        Perform Retrieval-Augmented Generation (RAG) queries with AI-powered analysis.

        This endpoint retrieves relevant document chunks from IDIRS for specified document IDs,
        then uses Google Gemini AI to analyze the chunks and produce a confidence-rated answer
        to the user's question.

        **Process:**
        1. For each document ID, calls IDIRS /rag endpoint to retrieve top-k chunks
        2. Aggregates all chunks and calculates confidence score from relevance scores
        3. Uses Gemini AI to analyze chunks and synthesize an answer
        4. Returns analysis with confidence rating and appropriate disclaimer

        **Features:**
        - Multi-document RAG queries
        - AI-powered answer synthesis using Google Gemini 2.5 Flash
        - Automatic confidence scoring from chunk relevance
        - High/low confidence classification (threshold: 0.80)
        - Multilingual responses (German/English)
        - Professional disclaimers based on confidence level

        **Configuration:**
        - IDIRS_BASE_URL (default: http://localhost:8010)
        - IDIRS_TIMEOUT (default: 30 seconds)
        - RAG_CONFIDENCE_THRESHOLD (default: 0.80)
      operationId: idirsRag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - doc_ids
                - question
              properties:
                doc_ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  description: Document IDs to query
                  example: ["doc_2024_001234", "doc_2024_001235"]
                question:
                  type: string
                  description: Question to answer from documents
                  example: "Welche Voraussetzungen gelten für die Aufenthaltsgenehmigung?"
                top_k:
                  type: integer
                  minimum: 1
                  maximum: 20
                  default: 5
                  description: Number of chunks per document
                language:
                  type: string
                  enum: ["de", "en"]
                  default: "de"
                  description: Response language (German or English)
            examples:
              germanQuery:
                summary: German RAG query
                value:
                  doc_ids: ["doc_2024_001234", "doc_2024_001235"]
                  question: "Welche Voraussetzungen gelten für die Aufenthaltsgenehmigung?"
                  top_k: 5
                  language: "de"
              englishQuery:
                summary: English RAG query
                value:
                  doc_ids: ["doc_2024_001234"]
                  question: "What are the requirements for residence permit?"
                  top_k: 10
                  language: "en"
      responses:
        '200':
          description: RAG query completed successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - analysis
                  - confidence
                  - is_high_confidence
                  - disclaimer
                  - doc_ids
                  - chunk_count
                properties:
                  analysis:
                    type: string
                    description: AI-generated analysis in requested language
                    example: "Für die Aufenthaltsgenehmigung gelten folgende Voraussetzungen: 1. Gültiger Reisepass, 2. Nachweis des Lebensunterhalts, 3. Krankenversicherung."
                  confidence:
                    type: number
                    format: float
                    minimum: 0.0
                    maximum: 1.0
                    description: Confidence score calculated from chunk relevance
                    example: 0.8542
                  is_high_confidence:
                    type: boolean
                    description: True if confidence >= threshold (default 0.80)
                    example: true
                  disclaimer:
                    type: string
                    description: Localized disclaimer based on confidence level
                    example: "Die Antwort wird durch Dokumentennachweise gut gestützt."
                  doc_ids:
                    type: array
                    items:
                      type: string
                    description: Document IDs that were queried
                    example: ["doc_2024_001234", "doc_2024_001235"]
                  chunk_count:
                    type: integer
                    description: Total number of chunks retrieved and analyzed
                    example: 8
              examples:
                highConfidence:
                  summary: High confidence response
                  value:
                    analysis: "Für die Aufenthaltsgenehmigung gelten folgende Voraussetzungen: 1. Gültiger Reisepass, 2. Nachweis des Lebensunterhalts, 3. Krankenversicherung. Diese Anforderungen sind in den analysierten Dokumenten klar dokumentiert."
                    confidence: 0.8542
                    is_high_confidence: true
                    disclaimer: "Die Antwort wird durch Dokumentennachweise gut gestützt."
                    doc_ids: ["doc_2024_001234", "doc_2024_001235"]
                    chunk_count: 8
                lowConfidence:
                  summary: Low confidence response
                  value:
                    analysis: "Die verfügbaren Dokumente enthalten nur fragmentarische Informationen zu Aufenthaltsgenehmigungen."
                    confidence: 0.6234
                    is_high_confidence: false
                    disclaimer: "Die Antwort ist unsicher. Eine manuelle Überprüfung der Dokumente wird empfohlen."
                    doc_ids: ["doc_2024_001234"]
                    chunk_count: 3
        '400':
          description: Bad request - invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Cannot connect to IDIRS service
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "Cannot connect to IDIRS service"
        '504':
          description: IDIRS request timed out
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "IDIRS RAG timed out"
      x-source-file: backend/api/idirs.py

  /api/validation/case/{case_id}:
    post:
      tags:
        - Validation
      summary: Validate case for submission completeness
      description: |
        AI-powered case validation using Gemini 2.5 Flash.

        **S5-005: Case Validation API**

        Analyzes form data, documents, and case context to provide structured feedback
        with score, warnings, and recommendations.

        **Score interpretation:**
        - 90-100: Ready for submission
        - 70-89: Minor issues to address
        - 50-69: Significant issues present
        - <50: Critical issues, not ready for submission

        **Features:**
        - AI-powered analysis using Gemini 2.5 Flash
        - Multilingual support (German/English)
        - Comprehensive form and document checking
        - Context-aware validation against required documents
        - Structured warnings by severity and category
        - Actionable recommendations
      operationId: validateCase
      parameters:
        - name: case_id
          in: path
          required: true
          description: Case ID to validate (e.g., ACTE-2024-001)
          schema:
            type: string
            example: ACTE-2024-001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                formData:
                  type: object
                  additionalProperties:
                    type: string
                  description: Dictionary of form field IDs to values
                  default: {}
                  example:
                    fullName: John Doe
                    dateOfBirth: "1990-01-15"
                    email: john@example.com
                language:
                  type: string
                  description: Response language code (de or en)
                  default: de
                  enum: [de, en]
                  example: de
                documentContents:
                  type: object
                  additionalProperties:
                    type: string
                  nullable: true
                  description: Optional cached document text contents
                  example:
                    doc-001: "Extracted text from document..."
      responses:
        '200':
          description: Validation completed successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - score
                  - summary
                  - warnings
                  - recommendations
                properties:
                  success:
                    type: boolean
                    description: Whether validation completed successfully
                    example: true
                  score:
                    type: integer
                    minimum: 0
                    maximum: 100
                    description: Validation score (1-100)
                    example: 75
                  summary:
                    type: string
                    description: Brief overall assessment
                    example: Case is mostly complete but missing some required documents.
                  warnings:
                    type: array
                    description: List of validation warnings
                    items:
                      type: object
                      required:
                        - severity
                        - category
                        - title
                        - details
                      properties:
                        severity:
                          type: string
                          enum: [critical, high, medium, low]
                          description: Warning severity level
                          example: critical
                        category:
                          type: string
                          description: Warning category
                          example: missing_documents
                        title:
                          type: string
                          description: Short warning title
                          example: Missing ID Document
                        details:
                          type: array
                          items:
                            type: string
                          description: Detailed issues
                          example: ["No passport or national ID uploaded"]
                  recommendations:
                    type: array
                    items:
                      type: string
                    description: Actionable next steps
                    example: ["Upload a valid passport or national ID", "Complete the address section"]
                  error:
                    type: string
                    nullable: true
                    description: Error message if validation failed
                    example: null
        '500':
          description: Validation processing failed
          content:
