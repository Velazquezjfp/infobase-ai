components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login endpoint

  schemas:
    AuthResponse:
      type: object
      required:
        - accessToken
        - tokenType
        - expiresIn
        - user
      properties:
        accessToken:
          type: string
          description: JWT access token
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          description: Token expiration time in seconds
          example: 3600
        refreshToken:
          type: string
          description: Refresh token for obtaining new access token
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      required:
        - id
        - username
        - role
      properties:
        id:
          type: string
          example: user-123
        username:
          type: string
          example: bamf.officer@example.de
        name:
          type: string
          example: Maria Schmidt
        role:
          type: string
          enum: [admin, officer, viewer]
          example: officer

    Case:
      type: object
      required:
        - id
        - name
        - createdAt
        - status
        - folders
      properties:
        id:
          type: string
          description: Unique case identifier
          example: ACTE-2024-001
        name:
          type: string
          description: Case name/title
          example: German Integration Course Application - Ahmed Ali
        createdAt:
          type: string
          format: date
          description: Case creation date
          example: '2024-01-15'
        status:
          type: string
          enum: [open, pending, completed]
          description: Current case status
          example: open
        folders:
          type: array
          items:
            $ref: '#/components/schemas/Folder'

    Folder:
      type: object
      required:
        - id
        - name
        - documents
        - subfolders
      properties:
        id:
          type: string
          example: personal-data
        name:
          type: string
          example: Personal Data
        isExpanded:
          type: boolean
          default: false
        documents:
          type: array
          items:
            $ref: '#/components/schemas/Document'
        subfolders:
          type: array
          items:
            $ref: '#/components/schemas/Folder'

    Document:
      type: object
      required:
        - id
        - name
        - type
        - size
        - uploadedAt
      properties:
        id:
          type: string
          example: doc-1
        name:
          type: string
          example: Birth_Certificate.pdf
        type:
          type: string
          enum: [pdf, xml, json, docx]
          example: pdf
        size:
          type: string
          description: Human-readable file size
          example: 245 KB
        uploadedAt:
          type: string
          format: date
          example: '2024-01-15'
        metadata:
          type: object
          additionalProperties: true
          description: Document-specific metadata
        content:
          type: string
          description: Document content (for text documents)

    FormField:
      type: object
      required:
        - id
        - label
        - type
        - value
      properties:
        id:
          type: string
          example: name
        label:
          type: string
          example: Full Name
        type:
          type: string
          enum: [text, date, select, textarea]
          example: text
        value:
          type: string
          example: Ahmed Ali
        options:
          type: array
          items:
            type: string
          description: Available options for select fields
        required:
          type: boolean
          default: false

    GeneratedField:
      type: object
      required:
        - id
        - label
        - type
      properties:
        id:
          type: string
          description: Unique field identifier in camelCase
          example: maritalStatus
        label:
          type: string
          description: Human-readable field label
          example: Marital Status
        type:
          type: string
          enum: [text, date, select, textarea]
          description: Field type
          example: select
        value:
          type: string
          description: Default field value (usually empty)
          default: ""
        options:
          type: array
          items:
            type: string
          description: Available options for select fields
          example: ["single", "married", "divorced"]
        required:
          type: boolean
          description: Whether the field is required
          default: false
        shaclMetadata:
          type: object
          description: SHACL semantic metadata in JSON-LD format
          properties:
            "@context":
              type: object
              description: JSON-LD context with namespace prefixes
              properties:
                sh:
                  type: string
                  example: "http://www.w3.org/ns/shacl#"
                schema:
                  type: string
                  example: "http://schema.org/"
                xsd:
                  type: string
                  example: "http://www.w3.org/2001/XMLSchema#"
            "@type":
              type: string
              description: SHACL type
              example: "sh:PropertyShape"
            "sh:path":
              type: string
              description: Semantic property path
              example: "schema:maritalStatus"
            "sh:datatype":
              type: string
              description: XSD datatype
              example: "xsd:string"
            "sh:name":
              type: string
              description: Human-readable name
              example: "Marital Status"
            "sh:description":
              type: string
              description: Field description
              example: "The person's marital status"
            "sh:minCount":
              type: integer
              description: Minimum cardinality (1 = required)
              example: 1
            "sh:maxCount":
              type: integer
              description: Maximum cardinality (1 = single value)
              example: 1
            "sh:in":
              type: object
              description: Allowed values for select fields
              properties:
                "@list":
                  type: array
                  items:
                    type: string
                  example: ["single", "married", "divorced"]

    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          example: UNAUTHORIZED
        message:
          type: string
          example: Invalid credentials provided
        details:
          type: object
          additionalProperties: true

    FileError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error type
          example: Validation failed
        detail:
          type: string
          description: Detailed error message
          example: case_id contains invalid characters
        file_name:
          type: string
          description: Name of the file involved in the error
          example: document.pdf

    CustomContextRule:
      type: object
      required:
        - id
        - type
        - createdAt
        - rule
      properties:
        id:
          type: string
          description: Unique rule identifier
          example: custom-rule-abc12345
        type:
          type: string
          enum: [validation_rule, required_document]
          description: Rule type
          example: validation_rule
        createdAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of rule creation
          example: "2026-01-16T14:30:00Z"
        targetFolder:
          type: string
          nullable: true
          description: Target folder for the rule (optional)
          example: Evidence
        rule:
          type: string
          description: Rule description or document requirement text
          example: Only PDFs should be allowed in here
        ruleType:
          type: string
          nullable: true
          description: Classification of the rule (for validation_rule) or document_requirement (for required_document)
          enum: [file_type, content, metadata, completeness, document_requirement, folder_rule]
          example: file_type

    FolderName:
      type: object
      required:
        - de
        - en
      properties:
        de:
          type: string
          description: German folder name
          example: Persönliche Daten
        en:
          type: string
          description: English folder name
          example: Personal Data

    FolderConfig:
      type: object
      required:
        - id
        - nameKey
        - name
        - mandatory
        - order
      properties:
        id:
          type: string
          description: Folder ID (kebab-case)
          example: personal-data
        nameKey:
          type: string
          description: Translation key (same as ID)
          example: personal-data
        name:
          $ref: '#/components/schemas/FolderName'
        mandatory:
          type: boolean
          description: Whether folder is required
          example: true
        order:
          type: integer
          description: Display order position
          example: 1

    FolderConfigResponse:
      type: object
      required:
        - schemaVersion
        - caseId
        - lastUpdated
        - folders
      properties:
        schemaVersion:
          type: string
          description: Configuration schema version
          example: "1.0"
        caseId:
          type: string
          description: Case identifier
          example: ACTE-2024-001
        lastUpdated:
          type: string
          format: date-time
          description: ISO 8601 timestamp of last update
          example: "2026-01-16T10:30:00.123456Z"
        folders:
          type: array
          items:
            $ref: '#/components/schemas/FolderConfig'

    CreateFolderRequest:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: Folder ID in kebab-case
          pattern: '^[a-z0-9-_]+$'
          example: my-custom-folder
        name:
          $ref: '#/components/schemas/FolderName'
        mandatory:
          type: boolean
          description: Whether folder is required
          default: false
          example: false

    UpdateFolderRequest:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/FolderName'
        mandatory:
          type: boolean
          description: Whether folder is required
          example: true
        order:
          type: integer
          description: Display order position
          example: 3

    BulkUpdateFoldersRequest:
      type: object
      required:
        - folders
      properties:
        folders:
          type: array
          description: Complete list of folders to configure
          items:
            $ref: '#/components/schemas/FolderConfig'
