  /api/idirs/search:
    post:
      tags:
        - IDIRS
      summary: Hybrid document search via IDIRS OpenSearch API
      description: |
        Proxy endpoint for IDIRS OpenSearch API performing hybrid search (BM25 + kNN).

        This endpoint forwards search requests to the IDIRS (Integrated Document Information
        Retrieval System) OpenSearch API, which combines BM25 keyword-based search with
        kNN semantic vector search for optimal document retrieval.

        **Features:**
        - Hybrid search combining keyword and semantic matching
        - Entity filtering by metadata fields
        - Document type filtering
        - Configurable result count (1-50 documents)
        - Transparent error forwarding from IDIRS

        **Configuration:**
        - IDIRS_BASE_URL (default: http://localhost:8010)
        - IDIRS_TIMEOUT (default: 30 seconds)
      operationId: idirsSearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  description: Semantic search query for document retrieval
                  example: "Aufenthaltsgenehmigung für Syrien"
                entity_filters:
                  type: object
                  additionalProperties:
                    type: string
                  description: Key-value pairs for entity filtering
                  example:
                    referenznummer: "REF-2024-12345"
                doc_type_filter:
                  type: string
                  description: Filter by document type
                  example: "decision_letter"
                top_k:
                  type: integer
                  minimum: 1
                  maximum: 50
                  default: 5
                  description: Number of results to return
            examples:
              basicSearch:
                summary: Basic search
                value:
                  query: "Aufenthaltsgenehmigung"
                  top_k: 5
              filteredSearch:
                summary: Filtered search with entity and document type
                value:
                  query: "Asylentscheidung"
                  entity_filters:
                    referenznummer: "REF-2024-12345"
                  doc_type_filter: "decision_letter"
                  top_k: 10
      responses:
        '200':
          description: Search completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        doc_id:
                          type: string
                          example: "doc_2024_001234"
                        score:
                          type: number
                          format: float
                          example: 0.9234
                        title:
                          type: string
                          example: "Aufenthaltsentscheidung Syrien"
                        document_type:
                          type: string
                          example: "decision_letter"
                        metadata:
                          type: object
                          additionalProperties: true
                        snippet:
                          type: string
                          example: "... Aufenthaltsgenehmigung für syrische Staatsangehörige ..."
                  total:
                    type: integer
                    example: 1
                  query:
                    type: string
                    example: "Aufenthaltsgenehmigung für Syrien"
        '400':
          description: Bad request - invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Cannot connect to IDIRS service
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "Cannot connect to IDIRS service"
        '504':
          description: IDIRS request timed out
          content:
